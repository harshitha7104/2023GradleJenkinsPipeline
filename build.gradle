/*
 * Updated for Gradle 9.5 Compatibility
 * Target: Jenkins Pipeline '2023GradleJenkinsPipeline'
 */

plugins {
    id 'java'
    id 'application'
    id 'maven-publish'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    // JCenter is removed in 9.5; using MavenCentral instead
    mavenCentral()
}

dependencies {
    // Changed 'compile' to 'implementation'
    implementation 'com.google.guava:guava:23.0'

    // Changed 'testCompile' to 'testImplementation'
    testImplementation 'junit:junit:4.12'
}

// In Gradle 9.x, the 'mainClassName' property is replaced by this block
application {
    mainClass = 'App' 
}

// Configuration for generating the JAR file
jar {
    manifest {
        attributes(
            'Main-Class': 'App'
        )
    }
}
